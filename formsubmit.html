<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://tinypic.host/images/2023/02/20/WRlogo.png" type="image/x-icon">
    <title>Form Submission</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 0px;
        }

        p {
            font-size: 14px;
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: rgb(54, 184, 154);
            color: #fff;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(54, 184, 154);
        }

        /* Animasi ketika submit berhasil */
        .submit-success {
            animation-name: submit-success;
            animation-duration: 2s;
            animation-fill-mode: forwards;
        }

        @keyframes submit-success {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <h1>Form Submission</h1>
    <p class="submit-success">Thank you for your message. I will get back to you soon.</p>
    <button onclick="redirectToHomePage()">Close</button>
    <script>
        function redirectToHomePage() {
            window.location.href = 'index.html';
        }

        // Animasi ketika submit berhasil
        const successMessage = document.querySelector('.submit-success');
        if (successMessage) {
            successMessage.classList.add('submit-success');
        }
    </script>
</body>

</html>
